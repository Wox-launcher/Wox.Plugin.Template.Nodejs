name: Check and Update SDK Version

on:
  schedule:
    - cron: "0 0 * * *" # Run at midnight every day
  workflow_dispatch: # Allow manual trigger

jobs:
  check-sdk-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for SDK Update
        id: check_update
        run: |
          # Get current wox-plugin version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').devDependencies['wox-plugin'] || require('./package.json').dependencies['wox-plugin']")
          echo "Current SDK version: $CURRENT_VERSION"

          # Get latest wox-plugin version from npm
          LATEST_VERSION=$(npm show wox-plugin version)
          echo "Latest SDK version: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "Update found: $CURRENT_VERSION -> $LATEST_VERSION"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Already up to date."
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update SDK and Project Version
        if: steps.check_update.outputs.has_update == 'true'
        run: |
          NEW_SDK_VERSION=${{ steps.check_update.outputs.latest_version }}

          # Update SDK version
          npm install wox-plugin@$NEW_SDK_VERSION --save-dev --save-exact

          # Increment plugin's own patch version
          NEW_PLUGIN_VERSION=$(npm version patch --no-git-tag-version)
          NEW_PLUGIN_VERSION_CLEAN=$(echo $NEW_PLUGIN_VERSION | sed 's/^v//')

          # Sync version to plugin.json
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('plugin.json', 'utf8'));
            plugin.Version = '$NEW_PLUGIN_VERSION_CLEAN';
            fs.writeFileSync('plugin.json', JSON.stringify(plugin, null, 2) + '\n');
          "

          echo "Updated to SDK $NEW_SDK_VERSION and Plugin version $NEW_PLUGIN_VERSION_CLEAN"

      - name: Create Pull Request
        if: steps.check_update.outputs.has_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "chore: update wox-plugin sdk to ${{ steps.check_update.outputs.latest_version }}"
          branch: "update-sdk-${{ steps.check_update.outputs.latest_version }}"
          title: "chore: update wox-plugin sdk to ${{ steps.check_update.outputs.latest_version }}"
          body: |
            A newer version of the `wox-plugin` SDK has been detected.

            - Latest version: `${{ steps.check_update.outputs.latest_version }}`
            - Plugin version has been bumped (patch).

            This PR was automatically generated by GitHub Action.
          delete-branch: true
